<script>
    launch();

    function launch() {
      try {
        // Point to fork instead of the original gn-math-DONTDMCA repo
    
        fetch("https://cdn.jsdelivr.net/gh/DEHZ00gn-math@main/singlefile.html?t="+Date.now())
          .then(response => response.text())
          .then(html => {
                const AD_DOMAINS = ['aclib','googletagmanager','eduplace','breadisgay','invoke.js','adsbygoogle','pagead','popads','exoclick','propellerads','googlesyndication'];
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                doc.querySelectorAll('script').forEach(s => {
                  const src = s.src || s.textContent || '';
                  if (AD_DOMAINS.some(d => src.includes(d))) s.remove();
                });
                const cleanHtml = doc.documentElement.outerHTML;
                document.documentElement.innerHTML = cleanHtml;

                window.open = function(url, t, f) {
                  if (!url || url === "about:blank") return null;
                  return null;
                };

                document.documentElement.querySelectorAll('script').forEach(oldScript => {
                    const src = oldScript.src || oldScript.textContent || '';
                    if (AD_DOMAINS.some(d => src.includes(d))) return;
                    const newScript = document.createElement('script');
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }
                    document.body.appendChild(newScript);
                });
          });
      } catch (error) {
        console.error('error:', error);
      }
    }
</script>
